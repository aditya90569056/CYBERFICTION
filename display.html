<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Portfolio Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">CYBERFICTION</a>
      <span class="text-muted">GitHub Portfolio Snapshot</span>
    </div>
  </nav>

  <main class="container py-4 py-md-5">
    <p id="statusMessage" class="text-muted mb-4">Loading GitHub profile...</p>

    <section id="profileCard" class="card shadow-sm mb-4 d-none">
      <div class="card-body">
        <div class="d-flex flex-column flex-md-row align-items-md-center gap-3">
          <img id="avatarImage" alt="GitHub Avatar" class="rounded-circle border" width="96" height="96">
          <div>
            <h1 id="profileName" class="h3 mb-1"></h1>
            <p id="profileUsername" class="text-secondary mb-2"></p>
            <p id="profileBio" class="mb-2"></p>
            <div class="d-flex flex-wrap gap-2">
              <span id="followersCount" class="badge text-bg-dark"></span>
              <span id="followingCount" class="badge text-bg-dark"></span>
              <span id="repoCount" class="badge text-bg-dark"></span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="card shadow-sm">
      <div class="card-body">
        <h2 class="h5 mb-3">Repositories</h2>
        <div id="repoList" class="row g-3"></div>
      </div>
    </section>
  </main>

  <script src="tool.js"></script>
</body>
</html>
